# SendGrid email setup — REFERENCE / CHECKLIST
# ---------------------------------------------------------------------------
# SendGrid has no "apply this file" blueprint (unlike render.yaml), so this is a
# human + copy-paste reference describing EXACTLY what to configure so paid
# buyers get their download link by email. Work top to bottom.
#
# What the backend sends: after a verified payment, server.py calls
# send_download_email() → POSTs to SendGrid's API → the buyer receives a
# "Your download: <file>" email containing a secure /dl?token=… link
# (valid GRANT_TTL_DAYS days / GRANT_MAX_DOWNLOADS downloads).
#
# If SENDGRID_API_KEY is NOT set, nothing breaks — the link is shown on-screen
# after payment instead. Email is an add-on.

provider: sendgrid
purpose: Deliver the secure download link to buyers after payment.

# 1) ACCOUNT
account:
  signup: https://signup.sendgrid.com/          # free tier = 100 emails/day
  notes: One account is enough to start.

# 2) SENDER IDENTITY  (SendGrid refuses to send "from" an unverified address)
#    Do at least single_sender. domain_authentication is better for the inbox.
sender_identity:
  from_address: connect@arjusingh.com            # MUST equal the address in MAIL_FROM
  from_name: Everything You Need

  single_sender:                                  # fastest (~2 min)
    where: Settings → Sender Authentication → Single Sender Verification
    steps:
      - Create New Sender with from_address above
      - Click the confirmation link SendGrid emails to that address

  domain_authentication:                          # recommended for deliverability
    where: Settings → Sender Authentication → Authenticate Your Domain
    domain: arjusingh.com
    steps:
      - Enter the domain; SendGrid returns ~3 CNAME records
      - Add those CNAMEs in your DNS host (registrar / Cloudflare)
      - Back in SendGrid, click Verify
    dns_records_placeholder:                       # SendGrid gives you the real values
      - { type: CNAME, host: "em####.arjusingh.com",         value: "u#######.wl###.sendgrid.net" }
      - { type: CNAME, host: "s1._domainkey.arjusingh.com",  value: "s1.domainkey.u#######.wl###.sendgrid.net" }
      - { type: CNAME, host: "s2._domainkey.arjusingh.com",  value: "s2.domainkey.u#######.wl###.sendgrid.net" }

# 3) API KEY  (this is the value your server needs)
api_key:
  where: Settings → API Keys → Create API Key
  name: eyn-backend
  permission: Restricted Access → Mail Send = Full Access   # nothing else
  important: Copy the key (SG.xxxxx) once — SendGrid shows it a single time.
  store_it: Never commit it. Put it in your host's secret store (below).

# 4) WIRE IT INTO THE BACKEND
#    The backend reads two env vars. Set them on whichever host you deploy to.
env_vars:
  SENDGRID_API_KEY: "SG.xxxxxxxx"                       # the key from step 3
  MAIL_FROM: "Everything You Need <connect@arjusingh.com>"  # must match verified sender

apply_on_host:
  render:
    where: Render service → Environment tab
    action: Add SENDGRID_API_KEY (and MAIL_FROM if changing the default). Save → redeploys.
    note: In render.yaml SENDGRID_API_KEY is declared as "sync:false" — you paste the value here.
  cloud_run:
    where: Google Secret Manager + deploy-backend.sh (already wired)
    commands:
      - printf %s 'SG.xxxxxxxx' | gcloud secrets create sendgrid-api-key --data-file=- --project resource-arjusingh
      - export RAZORPAY_KEY_ID=rzp_live_...; export ADMIN_PASSWORD=...; ./deploy-backend.sh
    note: deploy-backend.sh auto-detects the sendgrid-api-key secret and turns email ON.

# 5) VERIFY IT WORKS
test:
  - Buy a file using your own email address
  - Check inbox (and Spam the first time, until domain_authentication is done)
  - Expect subject "Your download: <file name>" with a Download button
  - The link works for 30 days / 10 downloads

# 6) LIMITS / TIPS
notes:
  - Free tier: 100 emails/day. Upgrade a plan if sales exceed that.
  - Deliverability: single_sender works but domain_authentication keeps you out of spam.
  - The "from" address MUST be a verified sender or SendGrid returns an error and no mail sends.
  - Want a different provider (Resend / Mailgun / SES / Gmail SMTP)? The code targets
    SendGrid's API — ask and it can be swapped; the env-var wiring stays the same shape.
